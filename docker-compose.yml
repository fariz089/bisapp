services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bispass}
      POSTGRES_DB: ${POSTGRES_DB:-bisdb}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bis} -d ${POSTGRES_DB:-bisdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: postgres://${POSTGRES_USER:-bis}:${POSTGRES_PASSWORD:-bispass}@db:5432/${POSTGRES_DB:-bisdb}
      JWT_SECRET: ${JWT_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # LLM (Nous Hermes / OpenAI-compatible)
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      # Pemetaan sesi -> endpoint container WA
      WA_ENDPOINTS: "cs=http://wa-cs:3001,tiket=http://wa-tiket:3001"
      MEDIA_DIR: /app/media
      # Siklus sesi otomatis (follow-up + auto-close)
      FOLLOWUP_AFTER_MIN: ${FOLLOWUP_AFTER_MIN:-3}
      CLOSE_AFTER_MIN: ${CLOSE_AFTER_MIN:-5}
      MAX_FOLLOWUPS: ${MAX_FOLLOWUPS:-1}
      LIFECYCLE_TICK_SEC: ${LIFECYCLE_TICK_SEC:-30}
      # Zona waktu (jam kerja & pengingat H-1)
      TZ: ${TZ:-Asia/Jakarta}
      # Pembayaran & pengingat
      PUBLIC_URL: ${PUBLIC_URL:-}
      REMINDER_HOUR: ${REMINDER_HOUR:-9}
      # Broadcast (rate-limit)
      BROADCAST_MIN_DELAY_MS: ${BROADCAST_MIN_DELAY_MS:-6000}
      BROADCAST_MAX_DELAY_MS: ${BROADCAST_MAX_DELAY_MS:-12000}
      BROADCAST_MAX_PER_RUN: ${BROADCAST_MAX_PER_RUN:-500}
      # Eskalasi pintar
      AGENT_ONLINE_GRACE_SEC: ${AGENT_ONLINE_GRACE_SEC:-90}
    ports:
      - "${BACKEND_PORT:-4000}:3000"
    volumes:
      - media_data:/app/media

  # ----- Nomor 1: Customer Service -----
  wa-cs:
    build: ./waservice
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      SESSION: cs
      PORT: 3001
      BACKEND_URL: http://backend:3000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      SYNC_HISTORY: ${SYNC_HISTORY:-true}
      SYNC_LIMIT: ${SYNC_LIMIT:-30}
      MEDIA_DIR: /app/media
      MAX_MEDIA_MB: ${MAX_MEDIA_MB:-16}
    volumes:
      - wa_cs_auth:/app/.wwebjs_auth
      - media_data:/app/media

  # ----- Nomor 2: Pemesanan Tiket & Info -----
  wa-tiket:
    build: ./waservice
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      SESSION: tiket
      PORT: 3001
      BACKEND_URL: http://backend:3000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      SYNC_HISTORY: ${SYNC_HISTORY:-true}
      SYNC_LIMIT: ${SYNC_LIMIT:-30}
      MEDIA_DIR: /app/media
      MAX_MEDIA_MB: ${MAX_MEDIA_MB:-16}
    volumes:
      - wa_tiket_auth:/app/.wwebjs_auth
      - media_data:/app/media

  # ----- Cloudflare Tunnel (akses publik tanpa buka port / port forwarding) -----
  # Mengekspos backend (port 3000) ke domain Cloudflare Anda lewat tunnel terenkripsi.
  # 1) Buat tunnel di dashboard Cloudflare Zero Trust -> Tunnels, salin TOKEN-nya.
  # 2) Isi CLOUDFLARE_TUNNEL_TOKEN di .env.
  # 3) Di konfigurasi tunnel (dashboard), arahkan Public Hostname Anda
  #    (mis. cs.usahabis.com) ke service: http://backend:3000
  # Catatan: set juga PUBLIC_URL=https://domain-anda agar link pembayaran absolut.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    depends_on:
      - backend
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  db_data:
  wa_cs_auth:
  wa_tiket_auth:
  media_data: